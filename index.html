<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Factory - By Abdul Wasay Rais</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-tasks"></i> Todo Factory</h1>
            <p>Manage your daily tasks efficiently and effectively</p>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Form Section -->
            <div class="form-section">
                <button class="refresh" onclick="window.location.reload()">
                    <h2><i class="fas fa-plus-circle"></i> Add New Task</h2>
                </button>
                <div>
                    <div class="form-group">
                        <label for="taskId">Task ID</label>
                        <input type="number" id="taskId" placeholder="e.g., 001" min="1" required>
                    </div>

                    <div class="form-group">
                        <label for="taskTitle">Task Title</label>
                        <input type="text" id="taskTitle" placeholder="Enter task title" required>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" name="" id="taskDone">
                        <label for="taskDone">
                           Mark as completed
                        </label>
                    </div>

                    <button id="submit" class="btn-add"><i class="fas fa-plus"></i> Add Task</button>
                </div>

                <hr class="section-divider">

                <div class="stats">
                 
                </div>
            </div>

            <div class="tasks-section">
                <h2>
                    <i class="fas fa-clipboard-list"></i>
                     Task List</h2>
                <div class="tasks-list">
              

                </div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
